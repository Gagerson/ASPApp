{% extends "base.html" %}
{% block title %}Edit {{ ticket.ticket_ref }} - Automation Support Portal{% endblock %}

{% block content %}
<!--suppress HtmlUnknownTarget -->
<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <h1 class="h3 mb-1">Edit ticket</h1>
    <div class="text-muted">{{ ticket.ticket_ref }}</div>
  </div>
  <a class="btn btn-outline-secondary" href="{{ url_for('ticket_detail', ticket_id=ticket.id) }}">Back</a>
</div>

<form method="post" class="card shadow-sm">
  <div class="card-body">
    <div class="row g-3">

      <!-- Row 1: Robot + Assign to -->
      <div class="col-md-6">
        <label for="robot_id" class="form-label">Robot</label>
        <select id="robot_id" name="robot_id" class="form-select" required>
          {% for r in robots %}
            <option value="{{ r.id }}" {% if r.id == ticket.robot_id %}selected{% endif %}>
              {{ r.name }} ({{ r.platform }})
            </option>
          {% endfor %}
        </select>
      </div>

      <div class="col-md-6">
        <label for="assigned_to_id" class="form-label">Assign to</label>
        <select id="assigned_to_id" name="assigned_to_id" class="form-select">
          <option value="">— Unassigned —</option>
          {% for u in users %}
            <option value="{{ u.id }}" {% if ticket.assigned_to_user_id == u.id %}selected{% endif %}>
              {{ u.name }} ({{ u.email }})
            </option>
          {% endfor %}
        </select>
      </div>

      <!-- Row 2: Category + Status -->
      <div class="col-md-6">
        <label for="category" class="form-label">Category</label>
        <select id="category" name="category" class="form-select" required>
          {% for c in ["StatusCheck","StatsRequest","Incident","ChangeRequest","Other"] %}
            <option value="{{ c }}" {% if ticket.category == c %}selected{% endif %}>{{ c }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="col-md-6">
        <label for="status" class="form-label">Status</label>
        <select id="status" name="status" class="form-select" required>
          {% for s in ["New","In Progress","Waiting on Requestor","Resolved","Closed"] %}
            <option value="{{ s }}" {% if ticket.status == s %}selected{% endif %}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Row 3: Subject (full width) -->
      <div class="col-12">
        <label for="subject" class="form-label">Subject</label>
        <input id="subject" name="subject" class="form-control" value="{{ ticket.subject }}" required minlength="5">
      </div>

      <!-- Row 4: Description (auto-expanding, full width) -->
      <div class="col-12">
        <label for="description" class="form-label">Description</label>
        <textarea
          id="description"
          name="description"
          class="form-control"
          required
          minlength="10"
          style="min-height: 120px; resize: vertical; overflow: hidden;"
          oninput="this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px';"
        >{{ ticket.description }}</textarea>
      </div>

    </div>
  </div>

  <div class="card-footer d-flex gap-2">
    <button class="btn btn-primary" type="submit">Save changes</button>
    <a class="btn btn-outline-secondary" href="{{ url_for('ticket_detail', ticket_id=ticket.id) }}">Cancel</a>
  </div>
</form>

<script>
  // Auto-expand description on page load to fit existing content
  document.addEventListener('DOMContentLoaded', function () {
    const textarea = document.getElementById('description');
    if (textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = textarea.scrollHeight + 'px';
    }
  });
</script>
{% endblock %}
